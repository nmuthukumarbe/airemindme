<!DOCTYPE html>
<html lang="en" xmlns="http://thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Engagement - Reminder Me</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8f9fb;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: #e2e8f0;
      border-radius: 4px;
    }
  </style>
</head>

<body class="bg-gray-50">

  <!-- Sidebar -->
  <div th:replace="~{remindmeui/fragments/layout :: sidebar(activePage='engagement')}"></div>

  <!-- Mobile nav -->
  <div th:replace="~{remindmeui/fragments/layout :: mobileNav(activePage='engagement')}"></div>
  

  <!-- Main -->
  <div class="md:ml-56 min-h-screen pb-24 md:pb-0 pt-14 md:pt-0">
    <div class="bg-white border-b border-gray-100 px-4 md:px-6 py-4 sticky top-14 md:top-0 z-20">
      <p class="text-xs text-gray-400 mb-1"><a href="home.html" class="hover:text-indigo-600">Home</a> / <span
          class="text-gray-700">Engagement</span></p>
      <h1 class="text-xl font-bold text-gray-900">Engagement</h1>
    </div>

    <div class="px-4 md:px-6 py-5">
      <!-- Stats -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 text-center">
          <div class="w-10 h-10 rounded-2xl bg-blue-50 flex items-center justify-center mx-auto mb-2"><svg
              class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg></div>
          <p id="stat-reminders-count" class="text-2xl font-bold text-gray-900">0</p>
          <p class="text-xs text-gray-500 mt-0.5">Reminders</p>
        </div>
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 text-center">
          <div class="w-10 h-10 rounded-2xl bg-pink-50 flex items-center justify-center mx-auto mb-2"><svg
              class="w-5 h-5 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
            </svg></div>
          <p id="stat-greetings-count" class="text-2xl font-bold text-gray-900">0</p>
          <p class="text-xs text-gray-500 mt-0.5">Greetings</p>
        </div>
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 text-center">
          <div class="w-10 h-10 rounded-2xl bg-emerald-50 flex items-center justify-center mx-auto mb-2"><svg
              class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg></div>
          <p id="stat-sent-today" class="text-2xl font-bold text-gray-900">0</p>
          <p class="text-xs text-gray-500 mt-0.5">Sent Today</p>
        </div>
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 text-center">
          <div class="w-10 h-10 rounded-2xl bg-violet-50 flex items-center justify-center mx-auto mb-2"><svg
              class="w-5 h-5 text-violet-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg></div>
          <p id="stat-upcoming" class="text-2xl font-bold text-gray-900">0</p>
          <p class="text-xs text-gray-500 mt-0.5">Upcoming</p>
        </div>
      </div>

      <!-- Tabs + View Toggle -->
      <div class="flex items-center justify-between mb-5">
        <div class="flex items-center gap-2 overflow-x-auto">
          <button onclick="switchTab('reminders')" id="tab-reminders"
            class="flex items-center gap-2 px-4 py-2 rounded-xl border-2 border-indigo-600 text-indigo-600 text-sm font-semibold flex-shrink-0">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            Reminders
          </button>
          <button onclick="switchTab('greetings')" id="tab-greetings"
            class="flex items-center gap-2 px-4 py-2 rounded-xl border-2 border-gray-200 text-gray-500 text-sm font-semibold hover:border-gray-300 flex-shrink-0">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
            </svg>
            Greetings
          </button>
        </div>
        <div class="flex items-center gap-1">
          <button onclick="setEngView('card')" id="ev-card" class="p-2 rounded-lg bg-indigo-50 text-indigo-600"><svg
              class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
            </svg></button>
          <button onclick="setEngView('list')" id="ev-list" class="p-2 rounded-lg text-gray-400 hover:bg-gray-100"><svg
              class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg></button>
        </div>
      </div>

      <!-- REMINDERS PANEL -->
      <div id="panel-reminders">
        <div class="flex items-center gap-3 mb-4">
          <div class="relative flex-1">
            <svg class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400" fill="none"
              stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input id="remSearch" type="text" placeholder="Search reminders..." oninput="filterReminders()"
              class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <button onclick="openModal('createReminderModal')"
            class="flex items-center gap-2 px-4 py-2 rounded-xl bg-indigo-600 text-white text-sm font-semibold hover:bg-indigo-700 transition shadow-sm flex-shrink-0">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            New Reminder
          </button>
        </div>
        <p class="text-sm text-gray-500 mb-4">
          <span id="total-reminders-label">0</span> reminders
        </p>
        <div id="remindersGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 mb-5"></div>
        <div id="remindersList" class="hidden bg-white rounded-2xl border border-gray-100 divide-y divide-gray-50 mb-5">
        </div>
        <div class="flex items-center justify-between">
          <p id="rem-page-label" class="text-sm text-gray-500">Showing 1–4 of 12</p>
          <div id="rem-pagination" class="flex items-center gap-1"></div>
        </div>
      </div>

      <!-- GREETINGS PANEL -->
      <div id="panel-greetings" class="hidden">
        <div class="flex items-center gap-3 mb-4">
          <div class="relative flex-1">
            <svg class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400" fill="none"
              stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input id="greetSearch" type="text" placeholder="Search greetings..." oninput="filterGreetings()"
              class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-pink-400">
          </div>
          <button onclick="openModal('sendGreetingModal')"
            class="flex items-center gap-2 px-4 py-2 rounded-xl bg-pink-600 text-white text-sm font-semibold hover:bg-pink-700 transition shadow-sm flex-shrink-0">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            New Greeting
          </button>
        </div>
        <p id="greet-count" class="text-sm text-gray-500 mb-4">10 greetings</p>
        <div id="greetingsGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 mb-5"></div>
        <div id="greetingsList" class="hidden bg-white rounded-2xl border border-gray-100 divide-y divide-gray-50 mb-5">
        </div>
        <div class="flex items-center justify-between">
          <p id="greet-page-label" class="text-sm text-gray-500">Showing 1–4 of 10</p>
          <div id="greet-pagination" class="flex items-center gap-1"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Create Reminder Modal -->
  <div id="createReminderModal" class="hidden fixed inset-0 z-50 flex items-end md:items-center justify-center">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeModal('createReminderModal')"></div>
    <div class="relative bg-white rounded-t-3xl md:rounded-3xl w-full max-w-md max-h-[95vh] overflow-y-auto shadow-2xl">
      <div class="flex justify-center pt-3 pb-1 md:hidden">
        <div class="w-10 h-1 rounded-full bg-gray-200"></div>
      </div>
      <div class="flex items-center justify-between px-5 pt-4 pb-3">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-2xl bg-blue-50 flex items-center justify-center"><svg
              class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg></div>
          <h2 class="text-lg font-bold text-gray-900">Create Reminder</h2>
        </div>
        <button onclick="closeModal('createReminderModal')"
          class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 hover:bg-gray-200 transition"><svg
            class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg></button>
      </div>
      <form onsubmit="submitReminder(event)" class="px-5 pb-6 flex flex-col gap-4">
        <div><label class="text-sm font-medium text-gray-700 mb-1.5 block">Select Customer <span
              class="text-red-500">*</span></label>
          <div class="relative"><select id="remCustomer" required
              class="w-full px-4 py-3 rounded-2xl border border-gray-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 appearance-none">
              <option value="">Choose customer...</option>

            </select><svg class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"
              fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg></div>
        </div>
        <div>
          <label class="text-sm font-medium text-gray-700 mb-1.5 block">Reminder Title <span
              class="text-red-500">*</span></label>
          <input type="text" id="remTitle" placeholder="e.g. Loan EMI Payment Due" required
            class="w-full px-4 py-3 rounded-2xl border border-gray-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-gray-400">
          <div class="flex flex-wrap gap-1.5 mt-2">
            <button type="button" onclick="document.getElementById('remTitle').value='EMI Payment Due'"
              class="px-3 py-1 rounded-full bg-indigo-50 text-indigo-600 text-xs font-medium hover:bg-indigo-100">EMI
              Payment Due</button>
            <button type="button" onclick="document.getElementById('remTitle').value='Policy Renewal'"
              class="px-3 py-1 rounded-full bg-indigo-50 text-indigo-600 text-xs font-medium hover:bg-indigo-100">Policy
              Renewal</button>
            <button type="button" onclick="document.getElementById('remTitle').value='Appointment Reminder'"
              class="px-3 py-1 rounded-full bg-indigo-50 text-indigo-600 text-xs font-medium hover:bg-indigo-100">Appointment</button>
          </div>
        </div>
        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label class="text-sm font-medium text-gray-700">Message <span class="text-red-500">*</span></label>
            <button type="button" onclick="genReminderMsg()"
              class="flex items-center gap-1.5 px-3 py-1 rounded-full bg-violet-50 text-violet-600 text-xs font-medium hover:bg-violet-100 transition"><svg
                class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3l14 9-14 9V3z" />
              </svg>Generate Message</button>
          </div>
          <textarea id="remMessage" placeholder="Enter your reminder message..." rows="4" required
            oninput="document.getElementById('remCC').textContent=this.value.length"
            class="w-full px-4 py-3 rounded-2xl border border-gray-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none placeholder-gray-400"></textarea>
          <p class="text-xs text-gray-400 mt-1"><span id="remCC">0</span> characters</p>
        </div>
        <!-- Reminder Type -->
        <div>
          <label class="text-sm font-medium text-gray-700 mb-2 block">Reminder Type <span
              class="text-red-500">*</span></label>
          <div class="flex rounded-2xl border border-gray-200 p-1 bg-gray-50 gap-1">
            <button type="button" onclick="setRemType('onetime')" id="rt-onetime"
              class="flex-1 py-2.5 rounded-xl text-sm font-semibold bg-white text-indigo-600 shadow-sm transition flex items-center justify-center gap-1.5">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              One Time
            </button>
            <button type="button" onclick="setRemType('recurring')" id="rt-recurring"
              class="flex-1 py-2.5 rounded-xl text-sm font-semibold text-gray-500 transition flex items-center justify-center gap-1.5">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
              </svg>
              Recurring
            </button>
          </div>
        </div>

        <!-- Recurring Frequency (shown only when Recurring) -->
        <div id="recurringFreqBox" class="hidden">
          <label class="text-sm font-medium text-gray-700 mb-2 block">Frequency <span
              class="text-red-500">*</span></label>
          <div class="grid grid-cols-4 gap-2">
            <button type="button" onclick="setFreq('daily')" id="freq-daily"
              class="py-2.5 rounded-xl border-2 border-gray-200 text-xs font-semibold text-gray-600 hover:border-indigo-300 transition">Daily</button>
            <button type="button" onclick="setFreq('weekly')" id="freq-weekly"
              class="py-2.5 rounded-xl border-2 border-gray-200 text-xs font-semibold text-gray-600 hover:border-indigo-300 transition">Weekly</button>
            <button type="button" onclick="setFreq('monthly')" id="freq-monthly"
              class="py-2.5 rounded-xl border-2 border-indigo-500 bg-indigo-50 text-xs font-semibold text-indigo-700 transition">Monthly</button>
            <button type="button" onclick="setFreq('yearly')" id="freq-yearly"
              class="py-2.5 rounded-xl border-2 border-gray-200 text-xs font-semibold text-gray-600 hover:border-indigo-300 transition">Yearly</button>
          </div>
          <div class="grid grid-cols-2 gap-3 mt-3">
            <div><label class="text-xs font-medium text-gray-600 mb-1 block">Total Occurrences</label><input
                type="number" id="remOccurrences" placeholder="e.g. 12" min="1" max="60"
                class="w-full px-3 py-2.5 rounded-xl border border-gray-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div><label class="text-xs font-medium text-gray-600 mb-1 block">Amount per Occurrence</label>
              <div class="flex gap-1"><span
                  class="flex items-center px-3 py-2 bg-gray-100 border border-gray-200 border-r-0 rounded-l-xl text-sm text-gray-600">₹</span><input
                  type="number" id="remAmount" placeholder="500"
                  class="flex-1 px-3 py-2.5 border border-gray-200 rounded-r-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
              </div>
            </div>
          </div>
        </div>

        <!-- Date & Time -->
        <div class="grid grid-cols-2 gap-3">
          <div><label class="text-sm font-medium text-gray-700 mb-1.5 block">Start Date <span
                class="text-red-500">*</span></label><input type="date" id="remDate" required
              class="w-full px-4 py-3 rounded-2xl border border-gray-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div><label class="text-sm font-medium text-gray-700 mb-1.5 block">Time</label><input type="time" id="remTime"
              value="09:00"
              class="w-full px-4 py-3 rounded-2xl border border-gray-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
        </div>

        <!-- Attach Plan / Product (MANDATORY) -->
        <div class="bg-indigo-50 border border-indigo-100 rounded-2xl p-4">
          <label class="text-sm font-semibold text-gray-800 mb-3 flex items-center gap-2">
            <svg class="w-4 h-4 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
            </svg>
            Attach Plan / Product <span class="text-red-500">*</span>
            <span class="text-xs text-indigo-500 font-normal">(required)</span>
          </label>
          <div class="flex rounded-xl border border-indigo-200 bg-white p-0.5 mb-3">
            <button type="button" onclick="setAttachTab('plan')" id="at-plan"
              class="flex-1 py-2 rounded-lg text-xs font-semibold bg-indigo-600 text-white transition">Plans</button>
            <button type="button" onclick="setAttachTab('product')" id="at-product"
              class="flex-1 py-2 rounded-lg text-xs font-semibold text-gray-500 transition">Products</button>
          </div>
          <div id="attachPlansPanel" class="grid grid-cols-1 gap-2 max-h-36 overflow-y-auto pr-1">
            <label
              class="flex items-center gap-3 px-3 py-2.5 rounded-xl border-2 border-indigo-500 bg-indigo-50/50 cursor-pointer">
              <input type="radio" name="attachedItem" value="plan-${plan.id}"> checked class="accent-indigo-600 w-4
              h-4">

            </label>

          </div>
          <div id="attachProductsPanel" class="hidden grid grid-cols-1 gap-2 max-h-36 overflow-y-auto pr-1">
            <label
              class="flex items-center gap-3 px-3 py-2.5 rounded-xl border border-gray-200 bg-white cursor-pointer hover:border-indigo-200">
              <input type="radio" name="attachedItem" value="product-${product.id}" class="accent-indigo-600 w-4 h-4">

            </label>

          </div>
        </div>

        <div><label class="text-sm font-medium text-gray-700 mb-2 block">Send Via</label>
          <div class="flex gap-2"><button type="button" onclick="selRemCh('whatsapp')" id="rch-wa"
              class="flex-1 py-2.5 rounded-full text-sm font-semibold bg-green-500 text-white transition">WhatsApp</button><button
              type="button" onclick="selRemCh('sms')" id="rch-sms"
              class="flex-1 py-2.5 rounded-full text-sm font-semibold bg-gray-100 text-gray-600 hover:bg-gray-200 transition">SMS</button><button
              type="button" onclick="selRemCh('email')" id="rch-em"
              class="flex-1 py-2.5 rounded-full text-sm font-semibold bg-gray-100 text-gray-600 hover:bg-gray-200 transition">Email</button>
          </div>
        </div>
        <button type="submit"
          class="w-full py-4 rounded-2xl bg-indigo-600 text-white font-semibold flex items-center justify-center gap-2 hover:bg-indigo-700 transition mt-1"><svg
            class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>Create Reminder</button>
      </form>
    </div>
  </div>

  <!-- Send Greeting Modal -->

  <script th:inline="javascript">
    // ============================================================
    // roCONSTANTS & CONFIG
    // ============================================================
    const API_BASE = "/api";
    const ACCOUNT_ID = [[${account.id}]];

    const REM_PER_PAGE = 4;
    const GREET_PER_PAGE = 4;

    const statusColors = {
      Scheduled: 'bg-blue-100 text-blue-700',
      Sent: 'bg-green-100 text-green-700',
      Pending: 'bg-orange-100 text-orange-700',
      Failed: 'bg-red-100 text-red-700'
    };

    const chIcon = {
      wa: `<svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
         <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
       </svg>`,
      sms: `<svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
        </svg>`,
      em: `<svg class="w-4 h-4 text-violet-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
         <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
       </svg>`
    };


    // ============================================================
    // roGLOBAL STATE
    // ============================================================
    let reminders = [];
    let allCustomers = [];
    let greetings = [];
    let allGroups = [];

    let remType = 'onetime';
    let recurFreq = 'monthly';
    let activeRemCh = 'whatsapp';
    let activeGtCh = 'wa';

    let engView = 'card';
    let remPage = 1;
    let greetPage = 1;
    let remSearchTerm = '';
    let greetSearchTerm = '';
    let greetingImgDataUrl = null;


    // ============================================================
    // roINIT  (single window.onload)
    // ============================================================
    window.onload = async () => {
      console.log("Initializing Dashboard...");
      try {
        // Load customers first so render functions don't show "Unknown"
        await loadCustomers();

        // Load the rest in parallel
        loadReminders();
        loadGreetings();
        loadCustomerGroups();
        updateTopStats();
        if (typeof loadPlans === "function") loadPlans();
        if (typeof loadProducts === "function") loadProducts();
      } catch (err) {
        console.error("Initialization failed:", err);
      }
    };


    // ============================================================
    // roDATA LOADERS
    // ============================================================

    async function loadCustomers() {
      try {
        const res = await fetch(`${API_BASE}/customers/my-customers`);
        if (!res.ok) throw new Error("Failed to load customers");

        allCustomers = await res.json();

        const remSel = document.getElementById("remCustomer");
        const greetSel = document.getElementById("gtCustomer");

        const options = allCustomers.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        const placeholder = '<option value="">Choose customer...</option>';

        if (remSel) remSel.innerHTML = placeholder + options;
        if (greetSel) greetSel.innerHTML = placeholder + options;

        renderReminders();
      } catch (e) {
        console.error("Customer Load Error:", e);
      }
    }

    async function loadCustomerGroups() {
      try {
        const res = await fetch(`${API_BASE}/customer-groups/my-groups`);

        if (!res.ok) {
          if (res.status === 401) console.error("User not logged in");
          return;
        }

        allGroups = await res.json();

        const groupSel = document.querySelector('#gwGrp select');
        if (groupSel) {
          groupSel.innerHTML = allGroups.length === 0
            ? '<option value="">No groups found</option>'
            : allGroups.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
        }

        renderGreetings();
      } catch (e) {
        console.error("Group Load Error:", e);
        allGroups = [];
      }
    }

    async function loadReminders() {
      try {
        const res = await fetch(`${API_BASE}/engagements/reminders/account/${ACCOUNT_ID}`);
        if (!res.ok) throw new Error("Failed to load reminders");

        reminders = await res.json();

        const countLabel = document.getElementById('total-reminders-label');
        if (countLabel) countLabel.textContent = reminders.length;

        const statElem = document.getElementById('stat-reminders-count');
        if (statElem) statElem.textContent = reminders.length;

        renderReminders();
      } catch (e) {
        console.error("Reminder fetch failed", e);
      }
    }

    async function loadGreetings() {
      try {
        const res = await fetch(`${API_BASE}/engagements/greetings/account/${ACCOUNT_ID}`);
        if (!res.ok) throw new Error("Failed to load greetings");

        greetings = await res.json();

        const greetCountLabel = document.getElementById('greet-count');
        if (greetCountLabel) greetCountLabel.textContent = `${greetings.length} greetings`;

        renderGreetings();
      } catch (e) {
        console.error("Greeting fetch failed", e);
      }
    }

    async function loadPlans() {
      try {
        const res = await fetch(`${API_BASE}/catalog/plans`);
        if (!res.ok) return;

        const plans = await res.json();
        const container = document.getElementById("attachPlansPanel");

        container.innerHTML = plans.map((p, idx) => `

    async function submitReminder(event) {
      event.preventDefault();

      const selectedItem = document.querySelector('input[name="attachedItem"]:checked');
      if (!selectedItem) return alert("Please select a Plan or Product to attach.");

      const [itemType, itemId] = selectedItem.value.split('-');

      const reminderPayload = {
        accountId: ACCOUNT_ID,
        customerId: parseInt(document.getElementById("remCustomer").value),
        title: document.getElementById("remTitle").value,
        message: document.getElementById("remMessage").value,
        reminderDate: document.getElementById("remDate").value,
        reminderTime: document.getElementById("remTime").value + ":00",
        reminderType: remType,
        frequency: remType === 'recurring' ? recurFreq : null,
        totalOccurrences: document.getElementById("remOccurrences")?.value || null,
        amount: document.getElementById("remAmount")?.value || null,
        channel: activeRemCh,
        attachedItemId: parseInt(itemId),
        attachedItemType: itemType,
        status: "Scheduled"
      };

      try {
        const res = await fetch(`${API_BASE}/engagements/reminders`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(reminderPayload)
        });

        if (res.ok) {
          closeModal('createReminderModal');
          event.target.reset();
          loadReminders();
        } else {
          const errorText = await res.text();
          console.error("Submission failed:", errorText);
        }
      } catch (e) {
        console.error("Submission error", e);
      }
    }

    async function submitGreeting(e) {
      e.preventDefault();

      const gtTypeVal = document.getElementById('gtHidden').value;
      const isIndividual = !document.getElementById('gwCust').classList.contains('hidden');

      const greetingPayload = {
        accountId: ACCOUNT_ID,
        greetingType: gtTypeVal.charAt(0).toUpperCase() + gtTypeVal.slice(1),
        message: document.getElementById('gtMessage').value,
        greetingDate: document.getElementById('gtDate').value,
        greetingTime: document.getElementById('gtTime').value + ":00",
        channels: activeGtCh,
        status: 'Scheduled',
        customerId: isIndividual ? parseInt(document.getElementById('gtCustomer').value) : null,
        customerGroupId: !isIndividual ? parseInt(document.querySelector('#gwGrp select').value) : null
      };

      try {
        const res = await fetch(`${API_BASE}/engagements/greetings`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(greetingPayload)
        });

        if (res.ok) {
          closeModal('sendGreetingModal');
          e.target.reset();
          if (typeof clearGreetingImg === "function") clearGreetingImg();
          loadGreetings();
        } else {

        console.error("Network Error:", e);
      }
    }

    async function deleteReminder(id) {
      if (!confirm("Are you sure you want to delete this reminder?")) return;

      try {
        const res = await fetch(`${API_BASE}/engagements/reminders/${id}?accountId=${ACCOUNT_ID}`, {
          method: "DELETE"
        });

        if (res.ok) {
          loadReminders();
        } else {
          const errorText = await res.text();
          console.error("Delete failed:", errorText);
        }
      } catch (e) {
        console.error("Network error during delete:", e);
      }
    }

    async function deleteGreeting(id) {
      if (!id) return;
      if (!confirm("Are you sure you want to delete this greeting?")) return;

      try {
        const res = await fetch(
          `${API_BASE}/engagements/greetings/${id}?accountId=${ACCOUNT_ID}`,
          { method: "DELETE" }
        );

        if (res.ok) {
          loadGreetings();
        } else {
          const errorData = await res.json();
          alert("Error: " + (errorData.error || "Server failed to delete"));
        }
      } catch (e) {
        console.error("Network Error during delete:", e);
      }
    }

    function filterReminders() {

      remSearchTerm = q;

      renderReminders();

    function getFilteredReminders() {
      if (!remSearchTerm) return reminders;
      return reminders.filter(r =>
        r.title?.toLowerCase().includes(remSearchTerm) ||
        r.message?.toLowerCase().includes(remSearchTerm)
      );
    }

    function filterGreetings() {
      const searchInput = document.getElementById('greetSearch');
      greetSearchTerm = (searchInput.value || '').toLowerCase().trim();
      greetPage = 1;
      renderGreetings();
    }

    function getFilteredGreetings() {
      if (!greetSearchTerm) return greetings;

      return greetings.filter(gr => {
        const customerObj = allCustomers.find(c => c.id === gr.customerId);
        const groupObj = allGroups.find(g => g.id === gr.customerGroupId);
        const displayName = customerObj ? customerObj.name : (groupObj ? groupObj.name : "");

        return (
          (gr.greetingType && gr.greetingType.toLowerCase().includes(greetSearchTerm)) ||
          (gr.message && gr.message.toLowerCase().includes(greetSearchTerm)) ||
          (displayName.toLowerCase().includes(greetSearchTerm)) ||
          (gr.status && gr.status.toLowerCase().includes(greetSearchTerm))
        );
      });

    // ============================================================
    // roPAGINATION
    // ============================================================

    function renderEngPagination(containerId, currentPage, total, perPage, goFnName) {
      const el = document.getElementById(containerId);
      if (!el) return;

      const totalPages = Math.ceil(total / perPage);
      if (totalPages <= 1) { el.innerHTML = ''; return; }

      const maxVisible = 5;
      let startP = Math.max(1, currentPage - Math.floor(maxVisible / 2));
      let endP = Math.min(totalPages, startP + maxVisible - 1);
      if (endP - startP < maxVisible - 1) startP = Math.max(1, endP - maxVisible + 1);

      const prev = `<button onclick="${goFnName}(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''} class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 text-gray-500 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
  </button>`;

      let pages = '';
      for (let i = startP; i <= endP; i++) {
        pages += `<button onclick="${goFnName}(${i})" class="w-8 h-8 flex items-center justify-center rounded-lg text-sm font-medium ${i === currentPage ? 'bg-indigo-600 text-white' : 'border border-gray-200 text-gray-600 hover:bg-gray-50'}">${i}</button>`;
      }

      const next = `<button onclick="${goFnName}(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''} class="w-8 h-8 flex items-center justify-center rounded-lg border border-gray-200 text-gray-500 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
  </button>`;

      el.innerHTML = prev + pages + next;
    }

    function goRemPage(p) {
      const total = getFilteredReminders().length;
      const tp = Math.ceil(total / REM_PER_PAGE);
      if (p < 1 || p > tp) return;
      remPage = p;
      renderReminders();
    }

    function goGreetPage(p) {
      const total = getFilteredGreetings().length;
      const tp = Math.ceil(total / GREET_PER_PAGE);
      if (p < 1 || p > tp) return;
      greetPage = p;
      renderGreetings();
    }

        const btn = document.getElementById(`tab-${t}`);

          panel.classList.remove('hidden');
          btn.classList.add('border-indigo-600', 'text-indigo-600');
          btn.classList.remove('border-gray-200', 'text-gray-500');

          btn.classList.remove('border-indigo-600', 'text-indigo-600');
          btn.classList.add('border-gray-200', 'text-gray-500');
        }

      ['reminders', 'greetings'].forEach(t => {
        document.getElementById(t + 'Grid').classList.toggle('hidden', v !== 'card');
        document.getElementById(t + 'List').classList.toggle('hidden', v !== 'list');
      });
      document.getElementById('ev-card').className = v === 'card'
        ? 'p-2 rounded-lg bg-indigo-50 text-indigo-600'
        : 'p-2 rounded-lg text-gray-400 hover:bg-gray-100';
      document.getElementById('ev-list').className = v === 'list'
        ? 'p-2 rounded-lg bg-indigo-50 text-indigo-600'
        : 'p-2 rounded-lg text-gray-400 hover:bg-gray-100';
    }

    function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

    let fabOpen = false;
    function toggleFab() {
      fabOpen = !fabOpen;
      document.getElementById('fabMenu').classList.toggle('hidden', !fabOpen);
      document.getElementById('fabOverlay').classList.toggle('hidden', !fabOpen);
      document.getElementById('fabIcon').style.transform = fabOpen ? 'rotate(45deg)' : 'rotate(0deg)';
    }

    function openMobileNav() {
      document.getElementById('mobileNavDrawer').style.transform = 'translateX(0)';
      document.getElementById('mobileNavBg').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeMobileNav() {
      document.getElementById('mobileNavDrawer').style.transform = 'translateX(-100%)';
      document.getElementById('mobileNavBg').classList.add('hidden');
      document.body.style.overflow = '';
    }


    // ============================================================
    // roREMINDER FORM CONTROLS
    // ============================================================

    function setRemType(t) {
      remType = t;
      const freq = document.getElementById('recurringFreqBox');
      const otBtn = document.getElementById('rt-onetime');
      const rcBtn = document.getElementById('rt-recurring');

      if (t === 'recurring') {
        freq.classList.remove('hidden');
        otBtn.className = 'flex-1 py-2.5 rounded-xl text-sm font-semibold text-gray-500 transition flex items-center justify-center gap-1.5';
        rcBtn.className = 'flex-1 py-2.5 rounded-xl text-sm font-semibold bg-white text-indigo-600 shadow-sm transition flex items-center justify-center gap-1.5';
      } else {
        freq.classList.add('hidden');
        otBtn.className = 'flex-1 py-2.5 rounded-xl text-sm font-semibold bg-white text-indigo-600 shadow-sm transition flex items-center justify-center gap-1.5';
        rcBtn.className = 'flex-1 py-2.5 rounded-xl text-sm font-semibold text-gray-500 transition flex items-center justify-center gap-1.5';
      }
    }

    function setFreq(f) {
      recurFreq = f;
      ['daily', 'weekly', 'monthly', 'yearly'].forEach(x => {
        document.getElementById('freq-' + x).className = x === f
          ? 'py-2.5 rounded-xl border-2 border-indigo-500 bg-indigo-50 text-xs font-semibold text-indigo-700 transition'
          : 'py-2.5 rounded-xl border-2 border-gray-200 text-xs font-semibold text-gray-600 hover:border-indigo-300 transition';
      });
    }

    function setAttachTab(t) {
      document.getElementById('attachPlansPanel').classList.toggle('hidden', t !== 'plan');
      document.getElementById('attachProductsPanel').classList.toggle('hidden', t !== 'product');
      document.getElementById('at-plan').className = t === 'plan'
        ? 'flex-1 py-2 rounded-lg text-xs font-semibold bg-indigo-600 text-white transition'
        : 'flex-1 py-2 rounded-lg text-xs font-semibold text-gray-500 transition';
      document.getElementById('at-product').className = t === 'product'
        ? 'flex-1 py-2 rounded-lg text-xs font-semibold bg-indigo-600 text-white transition'
        : 'flex-1 py-2 rounded-lg text-xs font-semibold text-gray-500 transition';
    }

    function selRemCh(ch) {
      activeRemCh = ch;
      const activeColors = { whatsapp: 'bg-green-500', sms: 'bg-blue-500', email: 'bg-violet-500' };
      const idMap = { whatsapp: 'rch-wa', sms: 'rch-sms', email: 'rch-em' };

      ['whatsapp', 'sms', 'email'].forEach(c => {
        const btn = document.getElementById(idMap[c]);
        if (!btn) return;
        btn.className = c === ch
          ? `flex-1 py-2.5 rounded-full text-sm font-semibold ${activeColors[c]} text-white transition shadow-sm`
          : `flex-1 py-2.5 rounded-full text-sm font-semibold bg-gray-100 text-gray-600 hover:bg-gray-200 transition`;
      });
    }

    function genReminderMsg() {
      const t = document.getElementById('remTitle').value || 'this reminder';
      const msgs = [
        `Dear Customer, this is a friendly reminder about your ${t}. Please ensure timely action to avoid any inconvenience.`,
        `Hi! Quick reminder about your ${t}. Please take action at your earliest convenience. Our team is here to assist you.`
      ];
      const m = msgs[Math.floor(Math.random() * msgs.length)];
      document.getElementById('remMessage').value = m;
      document.getElementById('remCC').textContent = m.length;
    }


    // ============================================================
    // roGREETING FORM CONTROLS
    // ============================================================

    function selGT(t) {
      document.getElementById('gtHidden').value = t;
      const map = { birthday: 'gt-b', anniversary: 'gt-a', festival: 'gt-f' };
      Object.keys(map).forEach(k => {
        const b = document.getElementById(map[k]);
        if (k === t) {
          b.classList.add('border-pink-400', 'bg-pink-50');
          b.classList.remove('border-gray-200');
        } else {
          b.classList.remove('border-pink-400', 'bg-pink-50');
          b.classList.add('border-gray-200');
        }
      });
    }

    function selST(m) {
      const indB = document.getElementById('st-ind');
      const grpB = document.getElementById('st-grp');

      if (m === 'ind') {
        indB.className = 'flex-1 py-2 rounded-xl text-sm font-medium bg-white text-rose-600 shadow-sm flex items-center justify-center gap-1.5 transition';
        grpB.className = 'flex-1 py-2 rounded-xl text-sm font-medium text-gray-500 flex items-center justify-center gap-1.5 transition';
        document.getElementById('gwCust').classList.remove('hidden');
        document.getElementById('gwGrp').classList.add('hidden');
      } else {
        grpB.className = 'flex-1 py-2 rounded-xl text-sm font-medium bg-white text-rose-600 shadow-sm flex items-center justify-center gap-1.5 transition';
        indB.className = 'flex-1 py-2 rounded-xl text-sm font-medium text-gray-500 flex items-center justify-center gap-1.5 transition';
        document.getElementById('gwCust').classList.add('hidden');
        document.getElementById('gwGrp').classList.remove('hidden');
      }
    }

    function selGtCh(ch) {
      activeGtCh = ch;
      const map = { wa: 'bg-green-500', sms: 'bg-blue-500', em: 'bg-violet-500' };
      ['wa', 'sms', 'em'].forEach(c => {
        document.getElementById('gch-' + c).className = c === ch
          ? `flex-1 py-2.5 rounded-full text-sm font-semibold ${map[c]} text-white transition`
          : 'flex-1 py-2.5 rounded-full text-sm font-semibold bg-gray-100 text-gray-600 hover:bg-gray-200 transition';
      });
    }

    function genGreetingMsg() {
      const t = document.getElementById('gtHidden').value;
      const msgs = {
        birthday: '🎂 Wishing you a very Happy Birthday! May this special day bring you endless joy, good health, and happiness. With warm regards from Acme Financial Services.',
        anniversary: '💍 Congratulations on your Anniversary! May your journey together continue to be filled with love, laughter, and cherished memories. Best wishes!',
        festival: '🎊 Wishing you and your family a joyful and prosperous festival! May this occasion bring happiness, good fortune, and wonderful memories.'
      };
      document.getElementById('gtMessage').value = msgs[t] || msgs.birthday;
    }


    // ============================================================
    // roIMAGE UPLOAD
    // ============================================================

    function handleGreetingImgUpload(input) {
      const file = input.files[0];
      if (!file) return;

      if (file.size > 5 * 1024 * 1024) {
        alert('Image must be less than 5MB. Please choose a smaller file.');
        input.value = '';
        return;
      }
      if (!file.type.startsWith('image/')) {
        alert('Please select a valid image file (PNG, JPG, etc.)');
        input.value = '';
        return;
      }

      const reader = new FileReader();
      reader.onload = function (e) {
        greetingImgDataUrl = e.target.result;
        document.getElementById('gtImgPreviewImg').src = e.target.result;
        document.getElementById('gtImgFileName').textContent = file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';
        document.getElementById('gtImgPreview').classList.remove('hidden');
        document.getElementById('gtImgLabel').classList.add('hidden');
      };
      reader.readAsDataURL(file);
    }

    function clearGreetingImg() {
      greetingImgDataUrl = null;
      const inp = document.getElementById('gtImgInput');
      if (inp) inp.value = '';
      document.getElementById('gtImgPreview').classList.add('hidden');
      document.getElementById('gtImgLabel').classList.remove('hidden');
    }
  </script>
