<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="apple-touch-icon" sizes="76x76" th:href="@{/assets/img/apple-icon.png}">
    <link rel="shortcut icon" th:href="@{web-assets/images/32x32-logo.svg}"
	type="image/x-icon">
    <title>
        AiPixture Register
    </title>
    <!--     Fonts and icons     -->
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700" rel="stylesheet" />
    <!-- Nucleo Icons -->
    <link th:href="@{/assets/css/nucleo-icons.css}" rel="stylesheet" />
    <link th:href="@{/assets/css/nucleo-svg.css}" rel="stylesheet" />
    <!-- Font Awesome Icons -->

    <link th:href="@{/assets/css/nucleo-svg.css}" rel="stylesheet" />
    <!-- CSS Files -->
    <link id="pagestyle" th:href="@{/assets/css/argon-dashboard.css?v=2.0.4}" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">




</head>

<body class="">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg position-absolute top-0 z-index-3 w-100 shadow-none my-3 navbar-transparent mt-4">
    <div class="container">
        <a class="navbar-brand font-weight-bolder ms-lg-0 ms-3 text-white" href="../pages/dashboard.html">
            AiPixture
        </a>
    </div>
</nav>
<!-- End Navbar -->
<main class="main-content  mt-0">
    <div class="page-header align-items-start min-vh-50 pt-5 pb-11 m-3 border-radius-lg" style="background-image: url('https://raw.githubusercontent.com/creativetimofficial/public-assets/master/argon-dashboard-pro/assets/img/signup-cover.jpg'); background-position: top;">
        <span class="mask bg-gradient-dark opacity-6"></span>
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 text-center mx-auto">
                    <h1 class="text-white mb-2 mt-5">Welcome to AiPixture!</h1>
<!--                    <p class="text-lead text-white">Use these awesome forms to login or create new account in your project for free.</p>-->
                </div>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="row mt-lg-n10 mt-md-n11 mt-n10 justify-content-center">
            <div class="col-xl-4 col-lg-5 col-md-7 mx-auto">
                <div class="card z-index-0">
                    <div class="card-header text-center pt-4">
                        <h5>Register to create Account</h5>
                    </div>
                    <div class="card-body">
                    	<div class="px-2 py-2" id="message"></div>
                        <form role="form">
                            <div class="mb-3">
                                <input id="name" type="text" class="form-control" placeholder="Name" aria-label="Name">
                            </div>
                            <div class="mb-3">
                                <input id="email" type="email" class="form-control" placeholder="Email" aria-label="Email">
                            </div>
                            <div class="mb-3">
                                <input id="mobile" type="text" maxlength="13" class="form-control" placeholder="Mobile" aria-label="Mobile" required>
                            </div>
                            <div class="mb-3">
                                <input id="password" type="password" class="form-control" placeholder="Password" aria-label="Password">
                            </div>
                            <div class="mb-3">
                                <input id="refAccId" type="text" th:value="${refAccId}" class="form-control" placeholder="Referral Code" aria-label="Referral Code">
                            </div>
                            <div class="form-check form-check-info text-start">
                                <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault" checked>
                                <label class="form-check-label" for="flexCheckDefault">
                                    I agree the <a href="/terms" class="text-dark font-weight-bolder">Terms and Conditions</a>
                                </label>
                            </div>
                            <div class="text-center">
                                <button type="button" onclick="registerUser()" class="btn bg-gradient-dark w-100 my-4 mb-2">Sign up</button>
                            </div>
                            <p class="text-sm mt-3 mb-0">Already have an account? <a th:href="@{/login}" class="text-dark font-weight-bolder">Sign in</a></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

                </a>
                <a href="/" target="_blank" class="text-secondary me-xl-4 me-4">

                <a href="/" target="_blank" class="text-secondary me-xl-4 me-4">

        <div class="row">

    if (win && document.querySelector('#sidenav-scrollbar')) {

        }
        Scrollbar.init(document.querySelector('#sidenav-scrollbar'), options);
    }
</script>
