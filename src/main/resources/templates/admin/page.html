<div class="container-fluid py-4">
	<div class="row">
		<div class="col-12">
			<div class="card mb-4">
				<div class="card-header pb-0">
					<div class="row">
						<div class="col-6 ">
							<h6>Admin Account Information</h6>
						</div>
						<div class="col-6 text-end">
							<button class="btn btn-danger btn-sm mb-0">Code: AIPIX<span th:text=${accountId}></span> </button>
							<button class="btn btn-primary btn-sm mb-0"
								th:onclick="window.open([[${accCreateURL}]], '_blank')"
								type="button">
								<i class="fa fa-plus"></i> Create New Account
							</button>
						</div>
					</div>
				</div>
				<div class="card-body px-0 pt-0 pb-2">
					<div class="table-responsive p-4">
						<table class="table align-items-center mb-0" id="adminTable" >
							<thead>
								<tr>
									<th
										class="text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Name</th>
									<th
										class="text-uppercase text-secondary text-xxs font-weight-bolder opacity-7 ps-2">Mobile</th>
									<th
										class="text-center text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Email</th>
									<th
										class="text-center text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Last
										updated</th>
									<th class="text-secondary opacity-7"></th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="account : ${accountList}">
									<td >
										<div class="d-flex px-2 py-1">
											<div>
												
											</div>
											<div class="d-flex flex-column justify-content-center">
												<h6 class="mb-0 text-sm" th:text="${account.name}"></h6>
											</div>
										</div>
									</td>
									<td>
										<p class="text-xs font-weight-bold mb-0" th:text="${account.mobile}"></p>
									</td>
									<td class="align-middle text-center text-sm">
									    <p class="text-xs font-weight-bold mb-0" th:text="${account.email}"></p>
									</td>
									<td class="align-middle text-center"><span
										class="text-secondary text-xs font-weight-bold" th:text="${account.createdDate}"></span>
									</td>
									<td class="align-middle">
									<a href="javascript:;" th:onclick="|loadViewAdmin('${account.id}');|" class="text-secondary font-weight-bold text-xs" data-toggle="tooltip" data-original-title="View account">
								              <i class="fas fa-eye"></i> View
								          </a>
								      </td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>

			</div>
		</div>
	</div>

</div>
