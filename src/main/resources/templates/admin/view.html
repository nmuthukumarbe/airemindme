<div class="">
	<div class="card shadow-lg mx-4 card-profile">
		<div class="card-body p-3">
			<div class="row gx-4">
				<div class="col-auto"></div>
				<div class="col-auto my-auto">
					<div class="h-100">
						<h5 class="mb-1">
							<span id="top-name"></span>
						</h5>
						<p class="mb-0 font-weight-bold text-sm"
							th:text="${account != null and account.id != null ? account.name : 'No Name'}"></p>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>

<div id="confirmModal" class="modal fade" tabindex="-1"
	aria-labelledby="exampleModalLabel" aria-hidden="true">
	<div class="modal-dialog">
		<div class="modal-content">
			<div class="modal-header">
				<h5 class="modal-title" id="exampleModalLabel">Confirmation</h5>
				<button type="button" class="btn-close" data-bs-dismiss="modal"
					aria-label="Close"></button>
			</div>
			<div class="modal-body">
				Are you sure you want to recharge <span id="plan_name"></span> plan?
			</div>
			<input id="plan_id" type="hidden" />
			<div class="modal-footer">
				<button type="button" class="btn btn-secondary btn-sm "
					data-bs-dismiss="modal">Close</button>
				<button type="button" onclick="updatePlan()"
					class="btn btn-sm  btn-primary">Recharge Plan</button>
			</div>
		</div>
	</div>
</div>

<div class="">
	<div class="container-fluid py-4">
		<div class="row">
			<div class="col-md-12">
				<div class="card">
					<div class="card-header pb-0">
						<div class="d-flex align-items-center">
							<p class="mb-0">View Account Details</p>

							<div class="ms-auto">
								<button th:if="${recharge}" class="btn btn-success btn-sm px-4"  
									onclick="showPlanConfirmationModel('1','Experience - 999')">Experience
									- 999</button>
								<button th:if="${recharge}" class="btn btn-success btn-sm px-4"
									onclick="showPlanConfirmationModel('2','Professional - 4999')">Professional
									- 4999</button>
								<button onclick="loadManageAdmin()"
									class="btn btn-default btn-sm ">Back to Main</button>
							</div>

						</div>
					</div>
					<div class="card-body">
						<p class="text-uppercase text-sm">Account Information</p>
						<div class="row">
							<div class="col-md-6">
								<div class="form-group">
									<label for="example-text-input" class="form-control-label">Name</label>
									<input disabled class="form-control" id="name" type="text"
										th:value="${account != null ? account.name : ''}">
								</div>
							</div>
							<div class="col-md-6">
								<div class="form-group">
									<label for="example-text-input" class="form-control-label">Active
										Plan</label> <input disabled class="form-control" id="name"
										type="text"
										th:value="${accountPlanUsage != null ? accountPlanUsage.plan.name : ''}">
								</div>
							</div>
							<div class="col-md-6">
								<div class="form-group">
									<label for="example-text-input" class="form-control-label">Mobile</label>
									<input disabled class="form-control" type="text"
										th:value="${account != null ? account.mobile : ''}">
								</div>
							</div>
							<div class="col-md-6">
								<div class="form-group">
									<label for="example-text-input" class="form-control-label">Email</label>
									<input disabled class="form-control" type="text"
										th:value="${account != null ? account.email : ''}">
								</div>
							</div>
							<div class="col-md-6">
								<div class="form-group">
									<label for="example-text-input" class="form-control-label">AI
										Event Cost</label> <input disabled class="form-control" type="text"
										th:value="${accountPlanUsage != null ? accountPlanUsage.plan.chargePerAI : ''}">
								</div>
							</div>
							<div class="col-md-6">
								<div class="form-group">
									<label for="example-text-input" class="form-control-label">Non-AI
										Event Cost</label> <input disabled class="form-control" type="text"
										th:value="${accountPlanUsage != null ? accountPlanUsage.plan.chargePerNonAI : ''}">
								</div>
							</div>
							<div class="col-md-6">
								<div class="form-group">
									<label for="example-text-input" class="form-control-label">Validity 
									Start Date</label> <input disabled class="form-control" type="text"
										th:value="${accountPlanUsage != null ? accountPlanUsage.startDate : ''}">
								</div>
							</div>
							<div class="col-md-6">
								<div class="form-group">
									<label for="example-text-input" class="form-control-label">Validity 
									End Date</label> <input disabled class="form-control" type="text"
										th:value="${accountPlanUsage != null ? accountPlanUsage.endDate : ''}">
								</div>
							</div>
							<div class="col-md-6">
								<div class="form-group">
									<label for="example-text-input" class="form-control-label">Balance
									</label> <input disabled class="form-control" type="text"
										th:value="${accountPlanUsage != null ? accountPlanUsage.balance : ''}">
								</div>
							</div>
							<input type="hidden" id="selected_account_id"
								th:if="${account != null}" th:value="${account.id}" />
						</div>
						<hr class="horizontal dark">
						<div class="row">

							<div class="col-12">
								<div class="card mb-4">
									<div class="card-header pb-0">
										<div class="row">
											<div class="col-6 ">
												<h6>Invoice Details</h6>
											</div>
										</div>

									</div>
									<div class="card-body px-0 pt-0 pb-2">
										<div class="table-responsive p-4">
											<table class="table align-items-center mb-0"
												id="invoiceTable">
												<thead>
													<tr>
														<th
															class="text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Invoice
															Number</th>
														<th
															class="text-uppercase text-secondary text-xxs font-weight-bolder opacity-7 ps-2">Invoice
															Date</th>
														<th
															class="text-center text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Start
															Date</th>
														<th
															class="text-center text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">End
															Date</th>
														<th
															class="text-center text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Plan
															Id</th>
														<th
															class="text-center text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Amount</th>
														<th class="text-center text-uppercase text-secondary text-xxs font-weight-bolder opacity-7"> Invoice PDF</th>
													</tr>
												</thead>
												<tbody>
													<tr th:each="invoice : ${invoiceList}">
														<td>
															<p class="text-xs font-weight-bold mb-0"
																th:text="${invoice.id}"></p>
														</td>
														<td>
															<p class="text-xs font-weight-bold mb-0"
																th:text="${invoice.createdDate}"></p>
														</td>
														<td class="align-middle text-center text-sm">
															<p class="text-xs font-weight-bold mb-0"
																th:text="${invoice.startDate}"></p>
														</td>
														<td class="align-middle text-center text-sm">
															<p class="text-xs font-weight-bold mb-0"
																th:text="${invoice.endDate}"></p>
														</td>
														<td class="align-middle text-center text-sm">
															<p class="text-xs font-weight-bold mb-0"
																th:text="${invoice.planId}"></p>
														</td>
														<td class="align-middle text-center text-sm">
															<p class="text-xs font-weight-bold mb-0"
																th:text="${invoice.amount}"></p>
														</td>
														<td class="align-middle"><a target="_blank"
															th:href="@{/downloadInvoice(invoiceId=${invoice.id}, accountId=${account.id})}"
															class="btn btn-sm btn-primary">Download Invoice</a></td>
													</tr>
												</tbody>
											</table>
										</div>
									</div>

								</div>
							</div>

						</div>
						<hr class="horizontal dark">
						<div class="row">

							<div class="col-12">
								<div class="card mb-4">
									<div class="card-header pb-0">
										<div class="row">
											<div class="col-6 ">
												<h6>Event Details</h6>
											</div>
										</div>

									</div>
									<div class="card-body px-0 pt-0 pb-2">
										<div class="table-responsive p-4">
											<table class="table align-items-center mb-0"
												id="eventTable">
												<thead>
													<tr>
														<th
															class="text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Event Id
															</th>
														<th
															class="text-uppercase text-secondary text-xxs font-weight-bolder opacity-7 ps-2">Event 
															Date</th>
														<th
															class="text-center text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Event
															Name</th>
														<th
															class="text-center text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Type
															</th>
														<th
															class="text-center text-uppercase text-secondary text-xxs font-weight-bolder opacity-7">Ai Event
															</th>
													</tr>
												</thead>
												<tbody>
													<tr th:each="event : ${eventList}">
														<td>
															<p class="text-xs font-weight-bold mb-0"
																th:text="${event.id}"></p>
														</td>
														<td>
															<p class="text-xs font-weight-bold mb-0"
																th:text="${event.date}"></p>
														</td>
														<td class="align-middle text-center text-sm">
															<p class="text-xs font-weight-bold mb-0"
																th:text="${event.name}"></p>
														</td>
														<td class="align-middle text-center text-sm">
															<p class="text-xs font-weight-bold mb-0"
																th:text="${event.typeOfEvent}"></p>
														</td>
														<td class="align-middle text-center text-sm">
															<p class="text-xs font-weight-bold mb-0"
																th:text="${event.isAIEnabled}"></p>
														</td>
													</tr>
												</tbody>
											</table>
										</div>
									</div>

								</div>
							</div>

						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>
