<div class="">
	<div class="card shadow-lg mx-4 card-profile">
		<div class="card-body p-3">
			<div class="row gx-4">
				<div class="col-auto">
					
				</div>
				<div class="col-auto my-auto">
					<div class="h-100">
						<h5 class="mb-1">
							<span id="top-name"></span>
						</h5>
						<p class="mb-0 font-weight-bold text-sm" th:text="${passport != null and passport.id != null ? passport.name : 'No Name'}"></p>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>
<div class="">
	<div class="container-fluid py-4">
		<div class="row">
			<div class="col-md-12">
				<div class="card">
					<div class="card-header pb-0">
						<div class="d-flex align-items-center">
							<p class="mb-0" > View Passport</p>							
							<button onclick="loadManagePassport()" class="btn btn-default btn-sm ms-auto">Back to
								Main</button>
						</div>
					</div>
					<div class="card-body">
						<p class="text-uppercase text-sm">User Information</p>
						<div class="row">
							<div class="col-md-6">
								<div class="form-group">
									<label for="example-text-input" class="form-control-label">Name</label>
									<input class="form-control" id="name" type="text"
										th:value="${passport != null ? passport.name : ''}">
								</div>
							</div>
							<div class="col-md-6">
								<div class="form-group">
									<label for="example-text-input" class="form-control-label">Mobile</label>
									<input class="form-control" id="mobile" type="text"
										th:value="${passport != null ? passport.mobile : ''}">
								</div>
							</div>
							<div class="col-md-6">
								<div class="form-group">
									<form id="passportImageUploadForm">
										<div style="display: flex">
											<div class="col-md-6 ">
												<label for="passportImageInput">Upload Passport Image:</label> <input
													type="file" id="passportImageInput"
													accept=".jpeg, .jpg, .JPEG, .JPG" required>
											</div>
										</div>
									</form>
								</div>
							</div>
							<input type="hidden" id="passportId" th:if="${passport != null}"
								th:value="${passport.id}" />
						</div>
						<hr class="horizontal dark">
						<div class="row">
							<div class="d-flex align-items-center">
								<button onclick="savePassport()"
									class="btn btn-primary btn-sm ms-auto">Save</button>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>
